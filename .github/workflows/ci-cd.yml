name: CloudScale CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  # ----------------------------------------------------
  # STAGE 1: VALIDATE (Runs in parallel on ALL branches)
  # ----------------------------------------------------
  app-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Local Test
        run: |
          docker build -t test-app:${{ github.sha }} .
          docker run -d --name test-container -p 8080:80 test-app:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8080/health
        # Cleanup happens automatically when the GitHub actions runner destroys itself!

  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform init
          terraform plan

  # ----------------------------------------------------
  # STAGE 2: BUILD & PUSH (Only on main, after tests pass)
  # ----------------------------------------------------
  build-and-push:
    needs: [app-test, terraform-plan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: kalthoumacr2026.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t kalthoumacr2026.azurecr.io/cloudscale-app:${{ github.sha }} -t kalthoumacr2026.azurecr.io/cloudscale-app:latest .
          docker push kalthoumacr2026.azurecr.io/cloudscale-app:${{ github.sha }}
          docker push kalthoumacr2026.azurecr.io/cloudscale-app:latest

  # ----------------------------------------------------
  # STAGE 3: DEPLOY (Only on main, after image is ready)
  # ----------------------------------------------------
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Apply Infrastructure Changes
        uses: hashicorp/setup-terraform@v3
        with:
          working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Deploy to AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: final_kalthoum_rawan_prj
          cluster-name: kalthoum-rawan-aks

      - name: K8s Apply & Verify
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/your-deployment-name-here # Better than just 'get pods'