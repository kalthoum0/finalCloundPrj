name: CloudScale CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan


  build-test:
    needs: terraform-plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -t cloudscale-app:${{ github.sha }} .

      - name: Start Container
        run: |
          docker run -d \
            --name test-container \
            -p 8080:80 \
            cloudscale-app:${{ github.sha }}

      - name: Verify Health Endpoint
        run: |
          sleep 5
          curl --fail http://localhost:8080/health

      - name: Cleanup Container
        if: always()
        run: |
          docker stop test-container || true
          docker rm test-container || true


  terraform-apply:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve


  push-to-acr:
    needs: terraform-apply
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build ACR Image
        run: |
          docker build \
            -t kalthoumacr2026.azurecr.io/cloudscale-app:${{ github.sha }} .

          docker tag \
            kalthoumacr2026.azurecr.io/cloudscale-app:${{ github.sha }} \
            kalthoumacr2026.azurecr.io/cloudscale-app:latest

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: kalthoumacr2026.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Push Docker Images
        run: |
          docker push kalthoumacr2026.azurecr.io/cloudscale-app:${{ github.sha }}
          docker push kalthoumacr2026.azurecr.io/cloudscale-app:latest


  deploy-to-aks:
    needs: push-to-acr
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: final_kalthoum_rawan_prj
          cluster-name: kalthoum-rawan-aks

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods
          kubectl get services