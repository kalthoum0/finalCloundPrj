<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Cloud & DevOps Engineering Project</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    .students {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .student {
      margin: 8px 0;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Final Cloud &amp; DevOps Engineering Project</h1>
    <div class="students">
      <p class="student">Rawan Eltheni &mdash; 4753</p>
      <p class="student">Kalthoum Alatrash &mdash; 4853</p>
    </div>
  </div>
</body>
</html>
